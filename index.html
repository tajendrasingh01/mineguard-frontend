<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Suraksha Prabandhan Pranali</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary-container": "#e50914"
      },
      fontFamily: {
        headline: ["Epilogue"],
        body: ["Inter"],
        label: ["Inter"]
      }
    }
  }
}
</script>

<style>
body{
  font-family: Inter;
}

/* 🔥 GLASS SYSTEM */
.glass{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

/* Inputs */
.glass-input{
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.4);
}

/* Buttons */
.glass-btn{
  transition: all 0.25s ease;
}
.glass-btn:hover{
  transform: translateY(-2px) scale(1.02);
}
.glass-btn:active{
  transform: scale(0.96);
}

/* Focus glow */
input:focus{
  box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
}

/* Smooth */
*{
  transition: all 0.2s ease;
}
</style>

</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center relative overflow-hidden">

<!-- Glow -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[400px] bg-red-500/10 blur-3xl pointer-events-none"></div>

<!-- Navbar -->
<nav class="fixed top-0 w-full z-50 glass flex justify-between items-center px-6 md:px-10 py-4">
  <div class="text-xl font-black text-primary-container tracking-tighter font-headline">
    SURAKSHA PRABANDHAN PRANALI
  </div>
  <div class="text-xs font-bold uppercase tracking-widest text-slate-500">
    Mine Worker Safety Portal
  </div>
</nav>

<!-- Login -->
<main class="w-full max-w-md px-4 pt-24 pb-12">

  <div class="glass overflow-hidden">

    <!-- Accent -->
    <div class="h-1 w-full bg-gradient-to-r from-red-600 via-red-400 to-red-600"></div>

    <div class="p-8">

      <div class="mb-8">
        <span class="text-red-600 text-[0.6rem] uppercase tracking-widest block mb-2">
          Operational Safety System
        </span>
        <h1 class="font-headline text-2xl font-bold">Mine Worker Portal</h1>
        <p class="text-slate-500 text-xs mt-1">Sign in or register</p>
      </div>

      <!-- Tabs -->
      <div class="flex mb-6 bg-white/40 backdrop-blur rounded-lg p-1 gap-1">
        <button id="tabSignIn" onclick="showTab('signin')" class="flex-1 py-2 text-xs font-bold bg-white rounded-md">
          Sign In
        </button>
        <button id="tabRegister" onclick="showTab('register')" class="flex-1 py-2 text-xs font-bold text-slate-400">
          Register
        </button>
      </div>

      <!-- SIGN IN -->
      <div id="panelSignin">
        <div class="space-y-4">

          <input id="loginId" class="glass-input w-full rounded-lg pl-4 py-3 text-sm"
            placeholder="ID / NEIS"/>

          <input id="loginPass" type="password"
            class="glass-input w-full rounded-lg pl-4 py-3 text-sm"
            placeholder="Password"/>

        </div>

        <div id="loginErr" class="hidden mt-3 text-red-600 text-xs"></div>

        <button id="loginBtn" onclick="doLogin()"
          class="glass-btn mt-6 w-full bg-red-600 text-white py-3 rounded-lg font-bold flex justify-center gap-2">

          <div id="loginSpin" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>

          <span id="loginTxt">SIGN IN</span>

        </button>
      </div>

      <!-- REGISTER -->
      <div id="panelRegister" class="hidden">

        <div class="space-y-4">

          <input id="regName" class="glass-input w-full rounded-lg py-3 px-4" placeholder="Full Name"/>

          <input id="regId" class="glass-input w-full rounded-lg py-3 px-4" placeholder="ID / NEIS"/>

          <select id="regDept" class="glass-input w-full rounded-lg py-3 px-4">
            <option value="">Select Department</option>
            <option>Departmental</option>
            <option>Contractual</option>
          </select>

          <input id="regPass" type="password"
            class="glass-input w-full rounded-lg py-3 px-4"
            placeholder="Password"/>

        </div>

        <div id="regErr" class="hidden mt-3 text-red-600 text-xs"></div>

        <button id="regBtn" onclick="doRegister()"
          class="glass-btn mt-6 w-full bg-red-600 text-white py-3 rounded-lg font-bold">

          <span id="regTxt">CREATE ACCOUNT</span>

        </button>

      </div>

    </div>

    <div class="bg-white/40 backdrop-blur px-8 py-3 text-xs text-slate-500">
      Secure Connection Established
    </div>

  </div>

</main>

<script>
const API_BASE = 'https://mineguard-api.onrender.com';

window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('mg_token');
  if (token) {
    try {
      const p = JSON.parse(atob(token.split('.')[1]));
      if (p.exp * 1000 > Date.now()) {
        window.location.href = 'app.html';
        return;
      }
    } catch {}
    localStorage.removeItem('mg_token');
  }
});

function showTab(tab) {
  const isSignin = tab === 'signin';
  document.getElementById('panelSignin').classList.toggle('hidden', !isSignin);
  document.getElementById('panelRegister').classList.toggle('hidden', isSignin);
}

async function doLogin() {
  const worker_id = loginId.value.trim();
  const password = loginPass.value;

  if (!worker_id || !password) return alert("Enter credentials");

  try {
    const res = await fetch(API_BASE + '/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({worker_id,password})
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    localStorage.setItem('mg_token', data.token);
    window.location.href = 'app.html';

  } catch(e){
    alert(e.message);
  }
}

async function doRegister() {
  const name = regName.value;
  const worker_id = regId.value;
  const department = regDept.value;
  const password = regPass.value;

  try {
    const res = await fetch(API_BASE + '/api/auth/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,worker_id,department,password})
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    localStorage.setItem('mg_token', data.token);
    window.location.href = 'app.html';

  } catch(e){
    alert(e.message);
  }
}
</script>

</body>
</html>
