<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Easy Trip — Plan your escape</title>

  <!-- Replace or host 'Satoshi' locally or via a font CDN. Fallback to system fonts if unavailable. -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Keep your existing stylesheet reference — styles.css is expected to remain the same in the repo -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <!-- Use your existing logo file in the repo (replace path if different) -->
        <img src="assets/logo.svg" alt="Easy Trip logo" width="120" />
      </div>

      <nav class="main-nav" aria-label="Main navigation">
        <a href="#about">About us</a>
        <a href="#reviews">Reviews</a>
        <a href="#blog">Our blog</a>
      </nav>

      <div class="header-cta">
        <a class="btn btn-outline" href="#download">Download App</a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-grid">
        <div class="hero-left">
          <h1 class="hero-title">
            <span class="title-line">PLAN YOUR</span>
            <span class="title-escape">ESCAPE</span>
          </h1>

          <div class="hero-card">
            <p class="hero-text">
              We have the largest selection of unique tours.
              Try our easy and quick tour selection for any request.
              24-hour support is always happy to answer all your questions.
            </p>

            <div class="hero-actions">
              <a class="btn btn-primary" href="#get-started">Get Started</a>

              <div class="stores">
                <!-- Replace these with real app-store icons in your assets folder -->
                <a href="#" aria-label="Download on the App Store" class="store">
                  <img src="assets/app-store.svg" alt="App Store" />
                </a>
                <a href="#" aria-label="Get it on Google Play" class="store">
                  <img src="assets/google-play.svg" alt="Google Play" />
                </a>
              </div>
            </div>
          </div>

          <p class="mobile-available">The mobile app is available now</p>
        </div>

        <div class="hero-right">
          <div class="phone-wrap">
            <!-- Replace this placeholder with your phone mockup image in assets/ -->
            <img src="assets/phone-mockup.png" alt="App preview on a phone" class="phone-img" />
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>© <span id="year"></span> Easy Trip</small>
    </div>
  </footer>

  <script>
    // Small script to set current year
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
